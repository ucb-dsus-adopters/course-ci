name: Regenerate notebooks against a candidate image (reusable)

# Reusable. Re-seed the notebooks against a specific base-user-image tag: run otter-assign
# INSIDE that image (so autograder test outputs are re-seeded to the image's reprs), then run
# the same gates as the PR pipeline (grader.check + otter grade) against it. If EVERYTHING
# passes, open a PR with the regenerated artifacts — its body and the Slack message both warn
# that the deployed base-user-image tag must be updated to this candidate BEFORE the notebooks
# are deployed (otherwise the next notebook-pipeline run regenerates against the old deployed
# image and reverts these). If any assemble/test fails, no PR is opened and Slack reports it.
#
# Course content -> ./course, tooling -> ./ci; scripts read COURSE_ROOT (= ./course).

on:
  workflow_call:
    inputs:
      ci_ref:
        description: "Ref of course-ci to check out for tooling (match the caller's @ref)."
        type: string
        default: main
      image_ref:
        description: "Full candidate image ref (…/base-user-image:TAG) to regenerate against. Leave blank to auto-resolve the newest tag."
        required: false
        type: string
      notebook:
        description: "Regenerate only this assignment (e.g. 'hw/hw12'); blank = all notebooks. Scopes the regenerate + grader.check + otter grade to just that pair."
        required: false
        type: string
        default: ""
      distributor_app_id:
        description: "Client id of the notebook-distributor GitHub App (vars.NOTEBOOK_DISTRIBUTOR_APP_ID), used to open the PR since the org blocks GITHUB_TOKEN from creating PRs."
        required: false
        type: string
        default: ""
    secrets:
      GCP_SA_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      NOTEBOOK_DISTRIBUTOR_PRIVATE_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write

env:
  IMAGE_REPO: us-central1-docker.pkg.dev/cal-icor-hubs/user-images/base-user-image
  COURSE_ROOT: ${{ github.workspace }}/course
  CI_TOOLING: ${{ github.workspace }}/ci/tooling

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: course
    steps:
      - name: Checkout course content
        uses: actions/checkout@v6
        with:
          path: course

      - name: Checkout course-ci tooling
        uses: actions/checkout@v6
        with:
          repository: ucb-dsus-adopters/course-ci
          ref: ${{ inputs.ci_ref }}
          path: ci

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host dependencies
        run: pip install nbformat

      - name: Authenticate to GCP
        run: echo '${{ secrets.GCP_SA_KEY }}' > "${HOME}/gcloud-service-key.json"

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth activate-service-account --key-file="${HOME}/gcloud-service-key.json"
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Resolve candidate image
        id: image
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_ref }}" ]; then
            ref="${{ inputs.image_ref }}"
          else
            tag=$(gcloud artifacts docker images list "$IMAGE_REPO" \
                    --include-tags --sort-by=~UPDATE_TIME --limit=1 \
                    --format='value(tags)' 2>/dev/null | tr ',' '\n' | grep -v '^$' | head -1)
            if [ -z "$tag" ]; then
              echo "::error::Could not auto-resolve a tag; pass image_ref explicitly."; exit 1
            fi
            ref="$IMAGE_REPO:$tag"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "tag=${ref##*:}" >> "$GITHUB_OUTPUT"
          echo "Candidate image: $ref"

      # The base-user-image is ~16GB and grading every pair writes a lot; a hosted runner's
      # ~14GB free space runs out mid-`otter grade` (ENOSPC). Reclaim the preinstalled
      # toolchains we don't use before pulling the image.
      - name: Free disk space
        run: |
          echo "Before:"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/share/powershell /usr/share/swift "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          sudo docker image prune -af >/dev/null 2>&1 || true
          echo "After:"; df -h / | tail -1

      - name: Pull candidate image
        run: docker pull "${{ steps.image.outputs.ref }}"

      - name: Regenerate notebooks inside candidate image
        run: |
          chmod -R a+rwX .
          # A single-assignment scope (e.g. notebook=hw/hw12) regenerates just that pair;
          # blank regenerates everything. Same runner either way (it already supports both).
          if [ -n "${{ inputs.notebook }}" ]; then
            scope="--notebook ${{ inputs.notebook }}"
            echo "Regenerating only: ${{ inputs.notebook }}"
          else
            scope="--all"
          fi
          docker run --rm -u root \
            -v "$COURSE_ROOT:/work" -w /work \
            -v "${{ github.workspace }}/ci:/ci" \
            "${{ steps.image.outputs.ref }}" \
            python /ci/tooling/otter_assign_runner.py $scope --kernel-name python3 --keep-going
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Fail if any notebook did not assemble
        run: |
          if [ -s .otter_assign_failures.txt ]; then
            echo "::error::Some notebooks failed to assemble against ${{ steps.image.outputs.ref }}:"
            cat .otter_assign_failures.txt
            exit 1
          fi
          echo "All notebooks assembled against the candidate image."

      - name: Stage regenerated pairs for tests
        run: |
          # Scope the test staging (and therefore grader.check + otter grade) to the same
          # assignment when notebook= is set, so a single-assignment run stays fast.
          if [ -n "${{ inputs.notebook }}" ]; then
            nb="${{ inputs.notebook }}"
            python "$CI_TOOLING/tests/fetch_test_notebooks.py" \
              --changed-files "raw_notebooks/${nb}/$(basename "$nb").ipynb"
          else
            python "$CI_TOOLING/tests/fetch_test_notebooks.py" --all
          fi

      - name: Run grader.check tests
        run: python "$CI_TOOLING/tests/run_grader_check_tests.py" --image "${{ steps.image.outputs.ref }}"

      - name: Run otter grade
        run: python "$CI_TOOLING/tests/run_otter_grade_tests.py" --image "${{ steps.image.outputs.ref }}"

      # The org blocks GITHUB_TOKEN from creating PRs, so mint a notebook-distributor App
      # token (same App that opens deploy PRs) to open the regeneration PR. Skipped if the
      # caller didn't pass distributor_app_id — the PR step then falls back to github.token
      # and, if that's blocked, to a compare link.
      - name: Generate distributor App token
        if: success() && inputs.distributor_app_id != ''
        id: apptoken
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.distributor_app_id }}
          private-key: ${{ secrets.NOTEBOOK_DISTRIBUTOR_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Everything above passed → open a PR with the regenerated artifacts. The body warns that
      # the deployed image tag must be bumped to this candidate BEFORE deploying the notebooks.
      - name: Open regeneration PR
        if: success()
        id: pr
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token || github.token }}
          REF: ${{ steps.image.outputs.ref }}
          TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf tests/test_files otterized
          branch="ci/regenerate-${TAG}-${{ github.run_id }}"
          git checkout -B "$branch"
          git add -A
          if git diff --cached --quiet; then
            echo "Notebooks already match ${REF}; nothing to regenerate."
            echo "opened=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git commit -m "ci: regenerate notebooks against ${REF} [skip ci]"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${branch}"
          {
            printf '%s\n\n' "Regenerated \`student_notebooks/\`, \`instructor_notebooks/\`, and \`autograder_zips/\` against candidate image \`${REF}\`. **grader.check + otter grade passed** on that image, so the notebooks grade correctly there."
            printf '%s\n' "> [!WARNING]"
            printf '%s\n' "> **Update the deployed base-user-image tag to \`${TAG}\` BEFORE deploying these notebooks.**"
            printf '%s\n' ">"
            printf '%s\n\n' "> These tests are now seeded to \`${REF}\`'s output reprs. If you deploy the notebooks while an older image is still deployed, the next \`notebook-pipeline\` run regenerates against the *deployed* image and reverts this."
            printf '%s\n' "### After merging, to publish these notebooks:"
            printf '%s\n' "1. Merge this PR."
            printf '%s\n' "2. Update the deployed base-user-image tag to \`${TAG}\` (2i2c infra config)."
            printf '%s\n\n' "3. **Run the [Deploy notebooks](../../actions/workflows/deploy-notebooks.yml) workflow** (with \`apply_changes: true\`) to sync \`student_notebooks/\` to the public repo."
            printf '%s\n' "Generated by the Regenerate workflow · run #${{ github.run_id }}."
          } > /tmp/pr_body.md
          # The branch is already pushed with all the regenerated artifacts, so if PR
          # creation is blocked (org setting "Allow GitHub Actions to create and approve
          # pull requests" off), don't fail the job — fall back to a compare link the
          # human can click to open the PR manually.
          compare="${{ github.server_url }}/${{ github.repository }}/compare/${{ github.event.repository.default_branch }}...${branch}?expand=1"
          if url=$(gh pr create \
                --title "ci: regenerate notebooks for base-user-image ${TAG}" \
                --body-file /tmp/pr_body.md \
                --base "${{ github.event.repository.default_branch }}" \
                --head "$branch" 2>/tmp/pr_err); then
            echo "PR: $url"
          else
            echo "::warning::gh pr create failed (likely 'Allow GitHub Actions to create pull requests' is off). Branch pushed; open the PR manually."
            cat /tmp/pr_err || true
            url="$compare"
          fi
          echo "opened=true" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (regenerated → PR opened)
        if: success() && steps.pr.outputs.opened == 'true'
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "✅ Regenerated + all tests pass on `${{ steps.image.outputs.ref }}` — review <${{ steps.pr.outputs.url }}|the PR>. ⚠️ Update the deployed base-user-image tag to `${{ steps.image.outputs.tag }}` BEFORE deploying these notebooks. · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}

      - name: Notify Slack (already up to date)
        if: success() && steps.pr.outputs.opened != 'true'
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "✅ Notebooks already match `${{ steps.image.outputs.ref }}`; nothing to regenerate. · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}

      - name: Notify Slack (failed)
        if: failure()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "❌ Regeneration/tests failed for `${{ steps.image.outputs.ref }}` — review needed (do NOT deploy). · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}