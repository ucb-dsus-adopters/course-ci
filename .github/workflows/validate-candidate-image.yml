name: Validate candidate base-user-image (reusable)

# Reusable. Dry-run a candidate base-user-image BEFORE it is deployed. Does NOT regenerate
# anything: it grades the CURRENTLY COMMITTED student/instructor/autograder notebooks against
# the candidate image, running the same tests as the PR gate (grader.check + otter grade), and
# reports the candidate's runtime. Green = the deployed notebooks still grade correctly on the
# new image.
#
# Course content -> ./course, tooling -> ./ci; scripts read COURSE_ROOT (= ./course).

on:
  workflow_call:
    inputs:
      ci_ref:
        description: "Ref of course-ci to check out for tooling (match the caller's @ref)."
        type: string
        default: main
      image_ref:
        description: "Full candidate image ref (…/base-user-image:TAG). Leave blank to auto-resolve the newest tag."
        required: false
        type: string
    secrets:
      GCP_SA_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  contents: read

env:
  # base-user-image GAR repo (same as the deployed one; only the tag varies).
  IMAGE_REPO: us-central1-docker.pkg.dev/cal-icor-hubs/user-images/base-user-image
  COURSE_ROOT: ${{ github.workspace }}/course
  CI_TOOLING: ${{ github.workspace }}/ci/tooling

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: course
    steps:
      - name: Checkout course content
        uses: actions/checkout@v6
        with:
          path: course

      - name: Checkout course-ci tooling
        uses: actions/checkout@v6
        with:
          repository: ucb-dsus-adopters/course-ci
          ref: ${{ inputs.ci_ref }}
          path: ci

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host dependencies
        run: pip install nbformat

      - name: Authenticate to GCP
        run: echo '${{ secrets.GCP_SA_KEY }}' > "${HOME}/gcloud-service-key.json"

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth activate-service-account --key-file="${HOME}/gcloud-service-key.json"
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Resolve candidate image
        id: image
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_ref }}" ]; then
            ref="${{ inputs.image_ref }}"
          else
            tag=$(gcloud artifacts docker images list "$IMAGE_REPO" \
                    --include-tags --sort-by=~UPDATE_TIME --limit=1 \
                    --format='value(tags)' 2>/dev/null | tr ',' '\n' | grep -v '^$' | head -1)
            if [ -z "$tag" ]; then
              echo "::error::Could not auto-resolve a tag; pass image_ref explicitly."; exit 1
            fi
            ref="$IMAGE_REPO:$tag"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Candidate image: $ref"

      # The base-user-image is ~16GB and grading every pair writes a lot; a hosted runner's
      # ~14GB free space runs out mid-`otter grade` (ENOSPC). Reclaim the preinstalled
      # toolchains we don't use before pulling the image.
      - name: Free disk space
        run: |
          echo "Before:"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/share/powershell /usr/share/swift "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          sudo docker image prune -af >/dev/null 2>&1 || true
          echo "After:"; df -h / | tail -1

      - name: Pull candidate image
        run: docker pull "${{ steps.image.outputs.ref }}"

      # No regeneration: stage the committed student/instructor/autograder pairs as-is,
      # then run the same tests the PR gate runs, but against the candidate image.
      - name: Stage committed notebook pairs for tests
        run: python "$CI_TOOLING/tests/fetch_test_notebooks.py" --all

      - name: Run grader.check tests
        run: python "$CI_TOOLING/tests/run_grader_check_tests.py" --image "${{ steps.image.outputs.ref }}"

      - name: Run otter grade
        run: python "$CI_TOOLING/tests/run_otter_grade_tests.py" --image "${{ steps.image.outputs.ref }}"

      - name: Runtime + import versions report
        if: always()
        run: |
          docker run --rm -v "$COURSE_ROOT:/work" -w /work -v "${{ github.workspace }}/ci:/ci" "${{ steps.image.outputs.ref }}" \
            python /ci/tooling/tests/report_image_env.py --image-ref "${{ steps.image.outputs.ref }}" \
            | tee report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-image-report
          path: course/report.md

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "${{ job.status == 'success' && '✅ safe to deploy' || '❌ review needed' }} — candidate base-user-image `${{ steps.image.outputs.ref }}` · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}